<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>Green Chat Login</title>

<style>
body {
  font-family: Arial;
  background:#0b141a;
  color:white;
  margin:0;
}

/* CONTAINER */
.section {
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* TOGGLE */
.checkbox {
  display:none;
}

label {
  cursor:pointer;
  display:block;
  margin:10px auto;
  width:60px;
  height:30px;
  background:#25d366;
  border-radius:50px;
}

/* CARD */
.card-3d-wrap {
  position:relative;
  width:300px;
  height:400px;
  perspective:800px;
}

.card-3d-wrapper {
  width:100%;
  height:100%;
  position:absolute;
  transform-style:preserve-3d;
  transition: all 0.8s ease;
}

.checkbox:checked ~ .card-3d-wrap .card-3d-wrapper {
  transform: rotateY(180deg);
}

/* FRONT/BACK */
.card-front, .card-back {
  position:absolute;
  width:100%;
  height:100%;
  background:#111b21;
  border-radius:10px;
  backface-visibility:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
}

.card-back {
  transform:rotateY(180deg);
}

/* FORM */
.form-group {
  margin:10px 0;
}

input {
  width:220px;
  padding:10px;
  border:none;
  border-radius:5px;
}

button {
  width:240px;
  padding:10px;
  margin-top:10px;
  background:#25d366;
  border:none;
  cursor:pointer;
  color:white;
}

/* APP */
#app {
  display:none;
  height:100vh;
  display:flex;
}

#sidebar {
  width:30%;
  background:#111b21;
}

#chat {
  width:70%;
  display:flex;
  flex-direction:column;
}

#messages {
  flex:1;
  overflow:auto;
  padding:10px;
}

.msg {
  padding:8px;
  margin:5px;
  border-radius:10px;
  max-width:60%;
}

.me {
  background:#25d366;
  margin-left:auto;
}

.other {
  background:#202c33;
}

</style>
</head>

<body>

<div class="section" id="auth">

<input class="checkbox" type="checkbox" id="reg-log"/>
<label for="reg-log"></label>

<div class="card-3d-wrap">
<div class="card-3d-wrapper">

<!-- LOGIN -->
<div class="card-front">
<div>
<h3>Login</h3>
<input id="loginUser" placeholder="Username"><br>
<input id="loginPass" type="password" placeholder="Password"><br>
<button onclick="login()">Login</button>
</div>
</div>

<!-- REGISTER -->
<div class="card-back">
<div>
<h3>Register</h3>
<input id="regUser" placeholder="Username"><br>
<input id="regPass" type="password" placeholder="Password"><br>
<button onclick="register()">Register</button>
</div>
</div>

</div>
</div>

</div>

<!-- CHAT -->
<div id="app">

<div id="sidebar">
<input id="friendInput" placeholder="Add friend">
<button onclick="addFriend()">Add</button>
<div id="friends"></div>
</div>

<div id="chat">
<div id="messages"></div>

<div>
<input id="msg">
<button onclick="send()">Send</button>
</div>
</div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();

let user = "";
let current = "";
let friends = [];

// REGISTER
async function register(){
    let u = regUser.value;
    let p = regPass.value;

    let res = await fetch("/register",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({username:u,password:p})
    });

    let data = await res.json();
    alert(data.success ? "Created" : "User exists");
}

// LOGIN
async function login(){
    let u = loginUser.value;
    let p = loginPass.value;

    let res = await fetch("/login",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({username:u,password:p})
    });

    let data = await res.json();

    if(data.success){
        user = u;
        socket.emit("register",user);

        document.getElementById("auth").style.display="none";
        document.getElementById("app").style.display="flex";
    } else {
        alert("Wrong login");
    }
}

// ADD FRIEND
async function addFriend(){
    let f = friendInput.value;

    let res = await fetch("/add-friend",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({myUsername:user,friendUsername:f})
    });

    let data = await res.json();

    if(data.success){
        friends.push(f);
        renderFriends();
    }
}

// FRIEND LIST
function renderFriends(){
    friendsDiv.innerHTML="";
    friends.forEach(f=>{
        let div=document.createElement("div");
        div.innerText=f;
        div.onclick=()=>current=f;
        friendsDiv.appendChild(div);
    });
}

// SEND
function send(){
    socket.emit("send-message",{to:current,from:user,text:msg.value});
    addMsg(msg.value,"me");
    msg.value="";
}

// RECEIVE
socket.on("receive-message",(data)=>{
    if(data.to===user || data.from===user){
        addMsg(data.text, data.from===user?"me":"other");
    }
});

function addMsg(text,type){
    let div=document.createElement("div");
    div.className="msg "+type;
    div.innerText=text;
    messages.appendChild(div);
}
</script>

</body>
</html>
