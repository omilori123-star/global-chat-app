<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>Global Chat App</title>
<style>
body{font-family:Arial;background:#f0f0f0;display:flex;justify-content:center;padding-top:30px}
#container{background:white;padding:20px;border-radius:10px;width:400px;box-shadow:0 0 15px rgba(0,0,0,0.3)}
h2,h3{text-align:center;color:#333}
#myId{font-size:24px;color:green;text-align:center;margin-bottom:10px}
input,button{padding:10px;margin:5px 0;width:100%;box-sizing:border-box;border-radius:5px;border:1px solid #ccc}
#friendsList{max-height:100px;overflow-y:auto;margin-bottom:10px;border:1px solid #ccc;border-radius:5px;padding:5px}
.friend{padding:5px;cursor:pointer;border-bottom:1px solid #eee}
.friend:hover{background:#f0f0f0}
#chatBox{max-height:200px;overflow-y:auto;border:1px solid #ccc;border-radius:5px;padding:5px;margin-bottom:10px}
.message{padding:3px;margin:3px 0}
.fromMe{text-align:right;color:blue}
.fromFriend{text-align:left;color:green}
</style>
</head>
<body>
<div id="container">
<h2>Global Chat App</h2>
<div id="myId">לא נוצר עדיין</div>
<button onclick="createUser()">צור משתמש</button>
<h3>הוסף חבר</h3>
<input id="friendCode" placeholder="הכנס קוד חבר">
<button onclick="addFriend()">אישור</button>
<div id="status"></div>
<h3>רשימת חברים</h3>
<div id="friendsList"></div>
<h3>צ’אט</h3>
<div id="chatBox"></div>
<input id="msg" placeholder="הקלד הודעה">
<button onclick="sendMessage()">שלח</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
let myId="",friends=[],currentFriend="";
const socket=io(); // Render URL ישתנה בהמשך

async function createUser(){
    let res=await fetch("/create-user",{method:"POST"});
    let data=await res.json();
    myId=data.id;
    document.getElementById("myId").innerText=myId;
    socket.emit("register",myId);
}
async function addFriend(){
    let friendId=document.getElementById("friendCode").value;
    let res=await fetch("/add-friend",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({myId,friendId})});
    let data=await res.json();
    if(data.success){document.getElementById("status").innerText="✔ נוסף בהצלחה";friends.push(friendId);renderFriends()}
    else document.getElementById("status").innerText="❌ קוד לא קיים";
}
function renderFriends(){const listDiv=document.getElementById("friendsList");listDiv.innerHTML="";friends.forEach(f=>{const div=document.createElement("div");div.className="friend";div.innerText=f;div.onclick=()=>{currentFriend=f;document.getElementById("chatBox").innerHTML=""};listDiv.appendChild(div)})}
function sendMessage(){if(!currentFriend){alert("בחר חבר");return}const text=document.getElementById("msg").value;if(!text)return;socket.emit("send-message",{to:currentFriend,from:myId,text});appendMessage(text,"fromMe");document.getElementById("msg").value=""}
function appendMessage(text,cls){const div=document.createElement("div");div.className="message "+cls;div.innerText=text;document.getElementById("chatBox").appendChild(div);div.scrollIntoView()}
socket.on("receive-message",({from,text})=>{appendMessage(from+": "+text,"fromFriend")});
</script>
</body>
</html>
